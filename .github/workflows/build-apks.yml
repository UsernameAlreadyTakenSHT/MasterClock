name: Build APKs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"

      - name: Write local.properties (release signing)
        run: |
          cat >> local.properties <<KEYEOF
          MASTERCLOCK_RELEASE_STORE_FILE=${{ github.workspace }}/release.keystore
          MASTERCLOCK_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MASTERCLOCK_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MASTERCLOCK_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYEOF

      - name: Build all flavors + paper (release APKs)
        run: ./gradlew buildAllReleaseFlavors

      - name: Remove decoded keystore
        if: always()
        run: rm -f "${{ github.workspace }}/release.keystore"

      - name: Stage renamed artifacts
        run: |
          mkdir -p dist
          tag="${{ github.ref_name }}"
          for flavor in complete standard light mini; do
            cp "app/build/outputs/apk/${flavor}/release/"*.apk "dist/masterclock-${flavor}-${tag}.apk"
          done
          cp paper/build/outputs/apk/release/*.apk "dist/masterclock-paper-${tag}.apk"

      - name: Upload APKs as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: masterclock-apks-${{ github.ref_name }}
          path: dist/*.apk
          if-no-files-found: error

      - name: Extract changelog section for this tag
        if: startsWith(github.ref, 'refs/tags/')
        run: awk '/^## /{n++} n==1{print}' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.apk
          body_path: release_notes.md
